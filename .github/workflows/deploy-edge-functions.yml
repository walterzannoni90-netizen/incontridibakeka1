name: Deploy Supabase Edge Functions

on:
  push:
    branches: [master]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: |
          supabase link --project-ref rdqsmfgpbuswzilgbjyr

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            SUPABASE_URL=https://rdqsmfgpbuswzilgbjyr.supabase.co

      - name: Deploy stripe-checkout
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: supabase functions deploy stripe-checkout --no-verify-jwt

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: supabase functions deploy stripe-webhook --no-verify-jwt

      - name: Deploy auth-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: supabase functions deploy auth-api --no-verify-jwt

      - name: Deploy boost
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: supabase functions deploy boost --no-verify-jwt
