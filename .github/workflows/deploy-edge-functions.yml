name: Deploy Supabase Backend

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref rdqsmfgpbuswzilgbjyr --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push --dry-run --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Set edge function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_10: ${{ secrets.VITE_STRIPE_PRICE_10 }}
          STRIPE_PRICE_30: ${{ secrets.VITE_STRIPE_PRICE_30 }}
          STRIPE_PRICE_70: ${{ secrets.VITE_STRIPE_PRICE_70 }}
          STRIPE_PRICE_150: ${{ secrets.VITE_STRIPE_PRICE_150 }}
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            STRIPE_PRICE_10="$STRIPE_PRICE_10" \
            STRIPE_PRICE_30="$STRIPE_PRICE_30" \
            STRIPE_PRICE_70="$STRIPE_PRICE_70" \
            STRIPE_PRICE_150="$STRIPE_PRICE_150" \
            SITE_URL=https://incontridibakeka.com \
            ALLOWED_ORIGINS=https://incontridibakeka.com

      - name: Deploy edge functions and remove obsolete ones
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ADMIN_TOKEN }}
        run: supabase functions deploy --no-verify-jwt --prune
