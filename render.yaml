services:
  - type: web
    name: incontridibakeka
    runtime: node
    repo: https://github.com/walterzannoni90-netizen/incontridibakeka1
    branch: master
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/stats
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
